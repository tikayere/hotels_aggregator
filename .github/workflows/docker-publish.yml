name: Build and publish Docker image

# Builds the Central Hospitality Platform (Service B) image from the
# Dockerfile at repo root and pushes it to Docker Hub. Same image both a
# local `docker compose build` and the deployed stack run.
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    # Doc-only commits don't change what gets built -- skip the (identical)
    # rebuild-and-republish they'd otherwise trigger.
    paths-ignore:
      - "**.md"
      - "LICENSE"
  workflow_dispatch: {}

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Derives tags from the git ref: `latest` + short-sha on every push to
      # main (sha tags exist so a bad `latest` can be rolled back to a known
      # good image by digest/tag rather than by re-building), plus semver
      # tags (v1.2.3 -> 1.2.3, 1.2, 1) when a version tag is pushed.
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/hotels_aggregator
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,prefix=sha-,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # Unlike hotels_erp (base image is amd64-only), this is a plain
      # python:3.12-slim app with no native-arch-locked dependencies, so it
      # publishes both platforms for real portability rather than defaulting
      # to amd64-only out of necessity.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
